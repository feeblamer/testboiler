# Укажите библиотеку, которую хотите тестировать.
# Можно указать `None`, если тестируете только встроенные модули Python.
# Это шаблон: замените значение ниже на реальный пакет, например `requests` или `numpy==2.2.0`.
library: <lib==2.0.1>

# Какие наборы тестов включать (можно выключить один из блоков)
framework:
  pytest: true
  unittest: true
